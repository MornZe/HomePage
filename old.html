<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MornZe | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x:hidden;
        }

        /* 背景（带轻模糊） */
        #bg-layer {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            z-index:-2;

            background-size:cover;
            background-position:center;
            background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format&fit=crop');

            transform: scale(1.08);
            filter: blur(6px);

            will-change: transform;
        }

        /* 遮罩（增加层次） */
        #overlay {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            z-index:-1;

            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(2px);
        }

        .main-container {
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:40px 20px 80px;
        }

        .avatar-wrap {
            position:relative;
            margin-bottom:1.5rem;
        }

        .avatar {
            width:100px;
            height:100px;
            border-radius:50%;
            overflow:hidden;
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
        }

        .avatar img {
            width:100%; height:100%;
            object-fit:cover;
        }

        .status-dot {
            position:absolute;
            bottom:6px; right:6px;
            width:14px; height:14px;
            background:#10b981;
            border-radius:50%;
            border:2px solid rgba(0,0,0,0.5);
        }

        .name {
            font-size:clamp(2rem,6vw,3rem);
            font-weight:300;
            color:rgba(255,255,255,0.95);
            letter-spacing:-0.02em;
            margin-bottom:1rem;
            text-shadow:0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
        }

        .name:hover {
            transform: translateY(-2px);
        }

        .name span {
            color:rgba(255,255,255,0.5);
        }

        .motto {
            font-size:0.95rem;
            color:rgba(255,255,255,0.7);
            line-height:1.8;
            font-style:italic;
            text-align:center;
            max-width:480px;
            margin-bottom:1.2rem;
            text-shadow:0 2px 10px rgba(0,0,0,0.3);
        }

        /* Blog */
        .blog-wrap {
            margin-top:-0.5rem;
            margin-bottom:1.5rem;
            opacity:0.7;
        }

        .blog-link {
            font-size:0.8rem;
            color:rgba(255,255,255,0.5);
            text-decoration:none;
            transition:all 0.25s ease;
        }

        .blog-link:hover {
            color:rgba(255,255,255,1);
            transform:translateX(4px);
        }

        .tech-section {
            text-align:center;
            margin-bottom:1.5rem;
        }

        .tech-label {
            font-size:0.7rem;
            color:rgba(255,255,255,0.4);
            text-transform:uppercase;
            letter-spacing:0.15em;
            margin-bottom:0.5rem;
        }

        .tech-list {
            font-size:0.9rem;
            color:rgba(255,255,255,0.8);
        }

        .tech-list span { margin:0 0.3rem; }

        .tech-list span:not(:last-child)::after {
            content:'·';
            margin-left:0.6rem;
            color:rgba(255,255,255,0.3);
        }

        .learning-section {
            text-align:center;
            margin-bottom:2rem;
        }

        .learning-text {
            font-size:0.85rem;
            color:rgba(255,255,255,0.5);
        }

        .learning-text::before {
            content:'//';
            margin-right:0.5rem;
            color:rgba(255,255,255,0.3);
        }

        .status-line {
            font-size:0.75rem;
            color:rgba(255,255,255,0.35);
            letter-spacing:0.08em;
            text-align:center;
            margin-top:-0.5rem;
        }

        .footer {
            position:fixed;
            bottom:0; left:0; right:0;
            padding:20px;
            text-align:center;
            background:linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        .footer-content {
            font-size:0.8rem;
            color:rgba(255,255,255,0.4);
        }

        .footer a {
            color:rgba(255,255,255,0.6);
            text-decoration:none;
            margin:0 0.5rem;
        }

        .footer a:hover {
            color:rgba(255,255,255,0.9);
        }

        .footer-divider {
            margin:0 0.5rem;
            color:rgba(255,255,255,0.2);
        }

        .cursor::after {
            content:'|';
            animation:blink 1.2s step-start infinite;
            color:rgba(255,255,255,0.4);
        }

        @keyframes blink { 50% { opacity:0; } }

        .fade-in {
            animation:fadeIn 0.8s ease forwards;
            opacity:0;
        }

        @keyframes fadeIn { to { opacity:1; } }

        .delay-1 { animation-delay:0.1s; }
        .delay-2 { animation-delay:0.2s; }
        .delay-3 { animation-delay:0.3s; }
        .delay-4 { animation-delay:0.4s; }
    </style>
</head>

<body class="text-white antialiased">

<div id="bg-layer"></div>
<div id="overlay"></div>

<div class="main-container">
    
    <div class="avatar-wrap fade-in">
        <div class="avatar">
            <img src="https://cdn.zeinklab.com/myfile/images/de749d78db8cc284.jpg">
        </div>
        <div class="status-dot"></div>
    </div>

    <h1 class="name fade-in delay-1">Morn<span>Ze</span></h1>

    <p id="motto" class="motto cursor fade-in delay-2">
        I write code in a language some declared dead. It pays my bills. We both win.
    </p>

    <div class="blog-wrap fade-in delay-3">
        <a href="https://blog.zeink.cc/" target="_blank" class="blog-link">
            → /blog
        </a>
    </div>

    <div class="tech-section fade-in delay-3">
        <div class="tech-label">Tech Stack</div>
        <div class="tech-list">
            <span>PHP</span>
            <span>Vue.js</span>
            <span>MySQL</span>
            <span>TypeScript</span>
        </div>
    </div>

    <div class="learning-section fade-in delay-3">
        <div class="learning-text">learning Hyperf & Nuxt.js</div>
    </div>

    <div class="status-line fade-in delay-4">
        online · building something quietly
    </div>

</div>

<footer class="footer fade-in delay-4">
    <div class="footer-content">
        <a href="https://github.com/MornZe" target="_blank">GitHub</a>
        <span class="footer-divider">/</span>
        <a href="mailto:hello@mornze.dev">Email</a>
        <span class="footer-divider">/</span>
        <span>&copy; <span id="year"></span> MornZe</span>
    </div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

/* 打字机 */
function typeWriter() {
    const el = document.getElementById('motto');
    const text = el.textContent;
    el.textContent = '';
    let i = 0;

    function type() {
        if (i < text.length) {
            el.textContent += text.charAt(i++);
            setTimeout(type, 45);
        }
    }

    setTimeout(type, 600);
}
document.addEventListener('DOMContentLoaded', typeWriter);

/* 平滑视差 */
let currentX = 0, currentY = 0;
let targetX = 0, targetY = 0;

document.addEventListener('mousemove', (e) => {
    targetX = (window.innerWidth/2 - e.clientX) / 40;
    targetY = (window.innerHeight/2 - e.clientY) / 40;
});

function animateBG() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    document.getElementById('bg-layer').style.transform =
        `scale(1.08) translate(${currentX}px, ${currentY}px)`;

    requestAnimationFrame(animateBG);
}
animateBG();
</script>

</body>
</html>
